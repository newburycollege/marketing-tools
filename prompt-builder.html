<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI prompt builder</title>
  <link rel="stylesheet" href="css/gds-theme.css" />
</head>
<body data-app-key="prompt-builder" data-app-title="AI prompt builder" data-app-intro="Build structured prompts for AI tools to generate Newbury College social media content consistently.">
  <div id="app-shell"></div>

  <template id="app-page-content">
    <section class="app-form" aria-labelledby="prompt-form-title">
      <h2 id="prompt-form-title" class="app-section-title">Create a social media prompt</h2>
      <p class="page-description">Answer the questions below and the tool will generate a ready-to-copy prompt for AI tools such as Copilot or ChatGPT.</p>

      <form id="promptBuilderForm" novalidate>
        <div class="form-group">
          <label for="postType">Post type</label>
          <p class="hint-text">Choose the kind of post you want to create.</p>
          <select id="postType" class="app-select">
            <option value="news" selected>News item, celebration, guest speaker or trip</option>
            <option value="vacancy">Apprenticeship vacancy</option>
            <option value="event">Event</option>
          </select>
        </div>

        <div class="app-note" id="dynamicGuidance">
          Focus on student experience, outcomes and positive impact. Highlight achievements, visits and opportunities.
        </div>

        <div class="app-grid app-grid--two">
          <div class="form-group">
            <label for="titleOrTopic">Title or main topic</label>
            <p class="hint-text">For example, travel and tourism trip to Madrid, guest speaker from Vodafone, or business administrator apprenticeship</p>
            <input type="text" id="titleOrTopic" autocomplete="off" />
            <p id="titleOrTopicError" class="error-message" aria-live="polite"></p>
          </div>
          <div class="form-group">
            <label for="audience">Target audience</label>
            <p class="hint-text">For example, school leavers, adults, employers, parents, general audience</p>
            <input type="text" id="audience" autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label for="summary">What happened or what is being promoted?</label>
          <p class="hint-text">Include the key facts in plain English.</p>
          <textarea id="summary" class="app-textarea" rows="5"></textarea>
          <p id="summaryError" class="error-message" aria-live="polite"></p>
        </div>

        <div class="app-grid app-grid--two">
          <div class="form-group">
            <label for="benefit">Why does it matter?</label>
            <p class="hint-text">For example, student achievement, career progression, employer links, enrichment, skills development</p>
            <textarea id="benefit" class="app-textarea" rows="4"></textarea>
          </div>
          <div class="form-group">
            <label for="cta">Call to action</label>
            <p class="hint-text">For example, apply now, find out more, book your place, discover our courses</p>
            <input type="text" id="cta" autocomplete="off" />
          </div>
        </div>

        <div id="newsFields" class="prompt-section">
          <h3 class="app-subsection-title">News details</h3>
          <div class="app-grid app-grid--two">
            <div class="form-group">
              <label for="newsPeople">Who was involved?</label>
              <input type="text" id="newsPeople" autocomplete="off" />
            </div>
            <div class="form-group">
              <label for="newsOutcome">Positive outcome or highlight</label>
              <input type="text" id="newsOutcome" autocomplete="off" />
            </div>
          </div>
        </div>

        <div id="vacancyFields" class="prompt-section prompt-section--hidden">
          <h3 class="app-subsection-title">Vacancy details</h3>
          <div class="app-grid app-grid--two">
            <div class="form-group">
              <label for="employer">Employer</label>
              <input type="text" id="employer" autocomplete="off" />
              <p id="employerError" class="error-message" aria-live="polite"></p>
            </div>
            <div class="form-group">
              <label for="deadline">Application deadline</label>
              <input type="text" id="deadline" autocomplete="off" />
            </div>
          </div>
          <div class="form-group">
            <label for="vacancyBenefits">Key selling points</label>
            <p class="hint-text">For example, salary, progression, hands-on experience, local employer, training support</p>
            <textarea id="vacancyBenefits" class="app-textarea" rows="4"></textarea>
          </div>
        </div>

        <div id="eventFields" class="prompt-section prompt-section--hidden">
          <h3 class="app-subsection-title">Event details</h3>
          <div class="app-grid app-grid--two">
            <div class="form-group">
              <label for="eventDate">Date and time</label>
              <input type="text" id="eventDate" autocomplete="off" />
              <p id="eventDateError" class="error-message" aria-live="polite"></p>
            </div>
            <div class="form-group">
              <label for="location">Location</label>
              <input type="text" id="location" autocomplete="off" />
            </div>
          </div>
          <div class="form-group">
            <label for="eventDetails">What will attendees get from it?</label>
            <textarea id="eventDetails" class="app-textarea" rows="4"></textarea>
          </div>
        </div>

        <div class="app-grid app-grid--two">
          <div class="form-group">
            <label for="link">Link (optional)</label>
            <p class="hint-text">Paste a webpage or tracked URL if you want AI to include one.</p>
            <input type="text" id="link" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="campaignHashtag">Additional hashtag (optional)</label>
            <p class="hint-text">For example, #OpenDay or #Apprenticeships</p>
            <input type="text" id="campaignHashtag" autocomplete="off" />
          </div>
        </div>

        <div class="app-grid app-grid--two">
          <div class="form-group">
            <label for="emojiRule">Emoji guidance</label>
            <select id="emojiRule" class="app-select">
              <option value="none" selected>Do not use emojis</option>
              <option value="restrict">Restrict emojis heavily</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tone">Tone</label>
            <select id="tone" class="app-select">
              <option value="professional but friendly" selected>Professional but friendly</option>
              <option value="warm and celebratory">Warm and celebratory</option>
              <option value="informative and concise">Informative and concise</option>
              <option value="confident and promotional">Confident and promotional</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="app-label" for="strictMode"><input type="checkbox" id="strictMode" checked /> Strict mode</label>
          <p class="hint-text">Adds stronger instructions to avoid emojis, waffle and unnecessary filler.</p>
        </div>

        <div class="app-button-row">
          <button type="submit">Build prompt</button>
          <button type="button" class="btn-secondary" id="copyPromptButton" disabled>Copy prompt</button>
          <button type="button" class="btn-secondary" id="clearPromptButton">Clear</button>
        </div>
      </form>
    </section>

    <section class="app-card" aria-labelledby="prompt-output-title">
      <h2 id="prompt-output-title" class="app-section-title">Generated prompt</h2>
      <p class="page-description">Copy this prompt into your preferred AI tool to generate the social posts.</p>

      <div class="form-group">
        <label for="promptOutput">Prompt</label>
        <textarea id="promptOutput" class="app-textarea" rows="18" readonly></textarea>
      </div>

      <div class="app-note" id="promptSummary">Complete the form above to generate a prompt.</div>
    </section>
  </template>

  <script src="js/gds-shell.js"></script>
  <script>
    (function () {
      function initialisePromptBuilder() {
        const form = document.getElementById('promptBuilderForm');
        const postType = document.getElementById('postType');
        if (!form || !postType) {
          return false;
        }

        if (form.dataset.initialised === 'true') {
          return true;
        }
        form.dataset.initialised = 'true';

        const guidance = document.getElementById('dynamicGuidance');
        const promptOutput = document.getElementById('promptOutput');
        const promptSummary = document.getElementById('promptSummary');
        const copyPromptButton = document.getElementById('copyPromptButton');
        const clearPromptButton = document.getElementById('clearPromptButton');

        const sections = {
          news: document.getElementById('newsFields'),
          vacancy: document.getElementById('vacancyFields'),
          event: document.getElementById('eventFields')
        };

        function clearSection(section) {
          const inputs = section.querySelectorAll('input, textarea');
          inputs.forEach(function (field) {
            field.value = '';
            field.classList.remove('error-input');
          });
        }

        function setError(fieldId, errorId, message) {
          const field = document.getElementById(fieldId);
          const error = document.getElementById(errorId);
          if (field) field.classList.toggle('error-input', Boolean(message));
          if (error) error.textContent = message || '';
        }

        function toggleSections() {
          const selected = postType.value;
          Object.keys(sections).forEach(function (key) {
            const section = sections[key];
            if (!section) return;
            const hidden = key !== selected;
            section.classList.toggle('prompt-section--hidden', hidden);
            if (hidden) clearSection(section);
          });
        }

        function updateGuidance() {
          if (postType.value === 'news') {
            guidance.textContent = 'Focus on student experience, outcomes and positive impact. Highlight achievements, visits and opportunities.';
          } else if (postType.value === 'vacancy') {
            guidance.textContent = 'Focus on career progression, employer credibility and benefits such as salary, experience and training.';
          } else {
            guidance.textContent = 'Focus on what attendees will gain, who it is for and why they should attend. Make the value clear.';
          }
        }

        function buildPromptText(data) {
          const hashtagLine = data.campaignHashtag
            ? '#NewburyCollege #CareersNotCourses ' + data.campaignHashtag
            : '#NewburyCollege #CareersNotCourses';

          let contextBlock = '';
          let typeInstruction = '';
          let typeSpecificCTA = '';

          if (data.postType === 'news') {
            contextBlock = [
              'Content type: News item, celebration, guest speaker or trip.',
              'Main topic: ' + data.titleOrTopic + '.',
              data.newsPeople ? 'People involved: ' + data.newsPeople + '.' : '',
              'Summary: ' + data.summary + '.',
              data.benefit ? 'Why it matters: ' + data.benefit + '.' : '',
              data.newsOutcome ? 'Positive outcome or highlight: ' + data.newsOutcome + '.' : ''
            ].filter(Boolean).join('\n');
            typeInstruction = '- Focus on storytelling, student experience and positive outcomes.';
            typeSpecificCTA = data.cta ? 'Include this call to action if appropriate: ' + data.cta + '.' : 'Include a suitable call to action only if it feels natural.';
          } else if (data.postType === 'vacancy') {
            contextBlock = [
              'Content type: Apprenticeship vacancy.',
              'Vacancy or main topic: ' + data.titleOrTopic + '.',
              data.employer ? 'Employer: ' + data.employer + '.' : '',
              'Summary: ' + data.summary + '.',
              data.vacancyBenefits ? 'Key selling points: ' + data.vacancyBenefits + '.' : '',
              data.deadline ? 'Application deadline: ' + data.deadline + '.' : '',
              data.benefit ? 'Why it matters: ' + data.benefit + '.' : ''
            ].filter(Boolean).join('\n');
            typeInstruction = '- Emphasise progression, employer credibility and career benefits.';
            typeSpecificCTA = data.cta ? 'Encourage applications clearly using this call to action where appropriate: ' + data.cta + '.' : 'Encourage applications clearly.';
          } else {
            contextBlock = [
              'Content type: Event.',
              'Event name or main topic: ' + data.titleOrTopic + '.',
              data.eventDate ? 'Date and time: ' + data.eventDate + '.' : '',
              data.location ? 'Location: ' + data.location + '.' : '',
              'Summary: ' + data.summary + '.',
              data.eventDetails ? 'What attendees will get from it: ' + data.eventDetails + '.' : '',
              data.benefit ? 'Why it matters: ' + data.benefit + '.' : ''
            ].filter(Boolean).join('\n');
            typeInstruction = '- Make the value of attending the event clear and compelling.';
            typeSpecificCTA = data.cta ? 'Encourage attendance or booking clearly using this call to action where appropriate: ' + data.cta + '.' : 'Encourage attendance or booking clearly.';
          }

          const emojiInstruction = data.strictMode
            ? 'Do not use emojis under any circumstances.'
            : (data.emojiRule === 'none' ? 'Do not use emojis.' : 'Restrict emojis heavily and only use them if absolutely necessary.');

          const optionalAudience = data.audience ? 'Target audience: ' + data.audience + '.' : '';
          const optionalLink = data.link ? 'If appropriate, include this link naturally at the end of each post: ' + data.link : '';

          return [
            'Write social media content for Newbury College.',
            '',
            'Create three separate versions of the post for:',
            '- Facebook',
            '- Instagram',
            '- LinkedIn',
            '',
            'Context:',
            contextBlock,
            optionalAudience,
            optionalLink,
            '',
            'Requirements:',
            '- Use UK English.',
            '- Do not use em dashes or en dashes.',
            '- Do not use American spelling.',
            '- Use a ' + data.tone + ' tone.',
            '- Keep each post suitable for its platform.',
            '- Keep the language clear, polished and ready to publish.',
            '- Avoid waffle and unnecessary filler.',
            '- Include the hashtags ' + hashtagLine + ' at the end.',
            '- ' + emojiInstruction,
            typeInstruction,
            '- ' + typeSpecificCTA,
            '',
            'Output format:',
            '- Facebook post clearly labelled',
            '- Instagram caption clearly labelled',
            '- LinkedIn post clearly labelled'
          ].filter(Boolean).join('\n');
        }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          const type = postType.value;
          const titleOrTopic = document.getElementById('titleOrTopic').value.trim();
          const summary = document.getElementById('summary').value.trim();
          let valid = true;

          if (!titleOrTopic) {
            setError('titleOrTopic', 'titleOrTopicError', 'Enter a title or main topic.');
            valid = false;
          } else {
            setError('titleOrTopic', 'titleOrTopicError', '');
          }

          if (!summary) {
            setError('summary', 'summaryError', 'Enter the key information for this post.');
            valid = false;
          } else {
            setError('summary', 'summaryError', '');
          }

          if (type === 'vacancy') {
            const employer = document.getElementById('employer').value.trim();
            if (!employer) {
              setError('employer', 'employerError', 'Enter an employer for the apprenticeship vacancy.');
              valid = false;
            } else {
              setError('employer', 'employerError', '');
            }
          } else {
            setError('employer', 'employerError', '');
          }

          if (type === 'event') {
            const eventDate = document.getElementById('eventDate').value.trim();
            if (!eventDate) {
              setError('eventDate', 'eventDateError', 'Enter a date and time for the event.');
              valid = false;
            } else {
              setError('eventDate', 'eventDateError', '');
            }
          } else {
            setError('eventDate', 'eventDateError', '');
          }

          if (!valid) {
            promptOutput.value = '';
            copyPromptButton.disabled = true;
            promptSummary.textContent = 'Please complete the highlighted fields and try again.';
            return;
          }

          const data = {
            postType: type,
            titleOrTopic: titleOrTopic,
            audience: document.getElementById('audience').value.trim(),
            summary: summary,
            benefit: document.getElementById('benefit').value.trim(),
            cta: document.getElementById('cta').value.trim(),
            newsPeople: document.getElementById('newsPeople').value.trim(),
            newsOutcome: document.getElementById('newsOutcome').value.trim(),
            employer: document.getElementById('employer').value.trim(),
            deadline: document.getElementById('deadline').value.trim(),
            vacancyBenefits: document.getElementById('vacancyBenefits').value.trim(),
            eventDate: document.getElementById('eventDate').value.trim(),
            location: document.getElementById('location').value.trim(),
            eventDetails: document.getElementById('eventDetails').value.trim(),
            link: document.getElementById('link').value.trim(),
            campaignHashtag: document.getElementById('campaignHashtag').value.trim(),
            emojiRule: document.getElementById('emojiRule').value,
            tone: document.getElementById('tone').value,
            strictMode: document.getElementById('strictMode').checked
          };

          promptOutput.value = buildPromptText(data);
          copyPromptButton.disabled = false;
          promptSummary.textContent = 'Prompt generated for ' + postType.options[postType.selectedIndex].text + '.';
        });

        copyPromptButton.addEventListener('click', async function () {
          if (!promptOutput.value) return;
          try {
            await navigator.clipboard.writeText(promptOutput.value);
            promptSummary.textContent = 'Prompt copied to clipboard.';
          } catch (error) {
            promptOutput.select();
            document.execCommand('copy');
            promptSummary.textContent = 'Prompt copied to clipboard.';
          }
        });

        clearPromptButton.addEventListener('click', function () {
          form.reset();
          setError('titleOrTopic', 'titleOrTopicError', '');
          setError('summary', 'summaryError', '');
          setError('employer', 'employerError', '');
          setError('eventDate', 'eventDateError', '');
          toggleSections();
          updateGuidance();
          promptOutput.value = '';
          copyPromptButton.disabled = true;
          promptSummary.textContent = 'Complete the form above to generate a prompt.';
        });

        postType.addEventListener('change', function () {
          toggleSections();
          updateGuidance();
          promptOutput.value = '';
          copyPromptButton.disabled = true;
          promptSummary.textContent = 'Complete the form above to generate a prompt.';
        });

        toggleSections();
        updateGuidance();
        return true;
      }

      function bootPromptBuilder() {
        if (initialisePromptBuilder()) return;
        window.requestAnimationFrame(bootPromptBuilder);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootPromptBuilder);
      } else {
        bootPromptBuilder();
      }
    })();
  </script>
</body>
</html>
