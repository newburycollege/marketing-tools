<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Hire Email Generator</title>
  <link rel="stylesheet" href="css/gds-theme.css" />
</head>
<body data-app-key="room-hire" data-app-title="Room Hire Email Generator" data-app-intro="Generate a booking link and ready-to-send email for room hire agreements.">
  <div id="app-shell"></div>

  <template id="app-page-content">
    <section class="app-form">
      <h2 class="app-section-title">Create room hire link</h2>
      <p class="page-description">Enter the booking reference, rate and rate unit to generate a room hire agreement link and email text.</p>

      <div class="form-group">
        <label for="bookingRef">Booking reference</label>
        <input type="text" id="bookingRef" />
      </div>

      <div class="form-group">
        <label for="rate">Rate</label>
        <input type="text" id="rate" />
      </div>

      <div class="form-group">
        <label for="rateUnit">Rate unit</label>
        <select id="rateUnit" class="app-select">
          <option value="per hour">Per hour</option>
          <option value="fixed rate">Fixed rate</option>
        </select>
      </div>

      <div class="app-button-row">
        <button type="button" id="generateBtn">Generate</button>
        <button type="button" class="btn-secondary" id="copyLinkBtn">Copy link</button>
      </div>
    </section>

    <section class="app-card">
      <h2 class="app-section-title">Generated link</h2>
      <textarea id="urlOutput" class="app-textarea" rows="4" readonly></textarea>
    </section>

    <section class="app-card">
      <h2 class="app-section-title">Email content</h2>
      <textarea id="emailOutput" class="app-textarea" rows="6" readonly></textarea>
      <div class="app-button-row">
        <button type="button" id="copyEmail" class="btn-secondary">Copy email</button>
      </div>
    </section>
  </template>

  <script src="js/gds-shell.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const baseUrl = 'https://newbury-college.ac.uk/index.php?option=com_rsform&formId=59';

      function copyText(id) {
        const text = document.getElementById(id).value;
        if (!text) return;
        navigator.clipboard.writeText(text).catch(function () {
          const field = document.getElementById(id);
          field.select();
          document.execCommand('copy');
        });
      }

      document.getElementById('generateBtn').addEventListener('click', function () {
        const bookingRefRaw = document.getElementById('bookingRef').value.trim();
        const rateRaw = document.getElementById('rate').value.trim();
        const rateUnitRaw = document.getElementById('rateUnit').value;

        if (!bookingRefRaw || !rateRaw) {
          alert('Enter booking reference and rate');
          return;
        }

        const bookingRef = encodeURIComponent(bookingRefRaw);
        const rate = encodeURIComponent(rateRaw);
        const rateUnit = encodeURIComponent(rateUnitRaw);
        const url = `${baseUrl}&form[rate]=${rate}&form[rateUnit]=${rateUnit}&form[bookingRef]=${bookingRef}`;

        document.getElementById('urlOutput').value = url;
        document.getElementById('emailOutput').value = `Please use the following link to complete your room hire booking:

${url}`;
      });

      document.getElementById('copyEmail').addEventListener('click', function () { copyText('emailOutput'); });
      document.getElementById('copyLinkBtn').addEventListener('click', function () { copyText('urlOutput'); });
    });
  </script>
</body>
</html>
