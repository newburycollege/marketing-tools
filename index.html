<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marketing tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/gds-theme.css" />
</head>
<body data-app-key="home" data-app-title="Marketing tools" data-app-intro="A suite of digital tools to support Newbury College marketing functions.">
  <div id="app-shell"></div>

  <template id="app-page-content">
    <div class="app-note">
      These tools are here to help Newbury College staff complete common marketing tasks quickly and easily.
    </div>

    <div class="app-grid app-grid--two">
      <section class="app-card">
        <h2 class="app-section-title">Available tools</h2>
        <p class="app-body-intro">Choose a tool below.</p>
        <ul class="tool-list">
          <li>
            <a class="tool-link" href="qr.html">
              <span class="tool-link__title">QR Code Generator</span>
              <span class="tool-link__description">Create a QR code from text or a URL, then download it as a PNG.</span>
            </a>
          </li>
          <li>
            <a class="tool-link" href="resize.html">
              <span class="tool-link__title">Image Resizer</span>
              <span class="tool-link__description">Upload one image and generate the required marketing image sizes in one go.</span>
            </a>
          </li>
          <li>
            <a class="tool-link" href="utm-builder.html">
              <span class="tool-link__title">UTM Link Builder</span>
              <span class="tool-link__description">Create consistent tracked links for campaigns, emails, social posts, QR codes and other marketing activity.</span>
            </a>
          </li>
          <li>
            <a class="tool-link" href="prompt-builder.html">
              <span class="tool-link__title">AI Prompt Builder</span>
              <span class="tool-link__description">Build structured prompts for AI tools to create Newbury College social media content consistently.</span>
            </a>
          </li>
        </ul>
      </section>

      <section class="app-card">
        <h2 class="app-section-title">Need another tool?</h2>
        <p class="app-body-intro">More useful tools may be added over time to support day-to-day marketing activity.</p>
        <p>If there is a task that could be made easier with a simple tool, please contact Shaun Daubney.</p>
      </section>
    </div>
  </template>

  <script src="js/gds-shell.js"></script>
</body>
</html>
