<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QR code generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/gds-theme.css" />
</head>
<body data-app-key="qr" data-app-title="QR code generator" data-app-intro="Enter text or a URL to generate a QR code you can scan or download.">
  <div id="app-shell"></div>

  <template id="app-page-content">
    <div class="app-panel" role="region" aria-labelledby="qr-panel-title">
      <h2 id="qr-panel-title" class="app-section-title">Create a new QR code</h2>
      <p class="page-description">Use a short, clear file name if you want the downloaded PNG to be easy to identify later.</p>

      <form onsubmit="handleSubmit(event)" novalidate>
        <div class="form-group">
          <label for="qrName">Name for this QR code</label>
          <p class="hint-text" id="qrNameHint">This will be used as the downloaded filename.</p>
          <input type="text" id="qrName" aria-describedby="qrNameHint" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="qrText">Text or URL</label>
          <p class="hint-text" id="qrHint">For example, <code>https://newbury-college.ac.uk</code> or any short piece of text.</p>
          <input type="text" id="qrText" aria-describedby="qrHint qrError" autocomplete="off" />
          <p id="qrError" class="error-message" aria-live="polite"></p>
        </div>

        <div class="button-row">
          <button type="submit" class="btn-primary" id="generateBtn">Generate QR code</button>
          <button type="button" class="btn-secondary" id="downloadBtn" onclick="downloadQR()" disabled>Download QR code</button>
        </div>
      </form>

      <div class="qr-wrapper" aria-live="polite" aria-atomic="true">
        <img id="qrImage" alt="Generated QR code" />
        <p id="qrPlaceholder" class="qr-placeholder">The QR code preview will appear here after you generate it.</p>
        <p id="qrStatus" class="status-text"></p>
      </div>
    </div>
  </template>

  <script src="js/gds-shell.js"></script>
  <script>
    const API_BASE = "https://api.qrserver.com/v1/create-qr-code/";
    const FIXED_SIZE = "512x512";
    const QR_MARGIN = 16;
    let currentQrUrl = "";

    function setError(message) {
      const input = document.getElementById("qrText");
      const error = document.getElementById("qrError");
      if (message) {
        error.textContent = message;
        input.classList.add("error-input");
      } else {
        error.textContent = "";
        input.classList.remove("error-input");
      }
    }

    function setStatus(message) {
      document.getElementById("qrStatus").textContent = message || "";
    }

    function handleSubmit(event) {
      event.preventDefault();
      generateQR();
    }

    function generateQR() {
      const textInput = document.getElementById("qrText");
      const img = document.getElementById("qrImage");
      const placeholder = document.getElementById("qrPlaceholder");
      const downloadBtn = document.getElementById("downloadBtn");
      const value = textInput.value.trim();

      if (!value) {
        setError("Enter some text or a URL to generate a QR code.");
        setStatus("");
        img.style.display = "none";
        placeholder.style.display = "block";
        downloadBtn.disabled = true;
        currentQrUrl = "";
        return;
      }

      setError("");
      const encoded = encodeURIComponent(value);
      const url = API_BASE + "?size=" + FIXED_SIZE + "&margin=" + QR_MARGIN + "&data=" + encoded + "&t=" + Date.now();
      currentQrUrl = url;
      img.src = url;
      img.style.display = "block";
      placeholder.style.display = "none";
      downloadBtn.disabled = false;
      setStatus("QR code generated. You can scan it on screen or download it as an image.");
    }

    function getSafeFileName(rawName) {
      if (!rawName) return "qr-code";
      const cleaned = rawName.trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-_]/g, "");
      return cleaned || "qr-code";
    }

    async function downloadQR() {
      if (!currentQrUrl) return;
      setStatus("Preparing download…");
      try {
        const response = await fetch(currentQrUrl, { cache: "no-store" });
        if (!response.ok) throw new Error("Failed to fetch QR image");
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const nameInput = document.getElementById("qrName");
        const baseName = getSafeFileName(nameInput ? nameInput.value : "");
        const fileName = baseName + "-qr-code.png";
        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(blobUrl);
        setStatus("Download started. If it has not appeared, check your browser downloads.");
      } catch (error) {
        console.error(error);
        setStatus("Could not download the QR code. Please try again.");
      }
    }
  </script>
</body>
</html>
